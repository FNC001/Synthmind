project_root: /Users/wyc/SynPred

# Source batch from adaptive layer.
batch_name: batch_500
adaptive_batch_root: /Users/wyc/SynPred/outputs/batch_adaptive

# Main pipeline.
pipeline_dir: /Users/wyc/SynPred/scripts/07_infer/structure_to_synthesis_route/pipeline
pipeline_config: /Users/wyc/SynPred/scripts/07_infer/structure_to_synthesis_route/pipeline/configs/full_route_stage3.yaml

# Reliability outputs.
reliability_out_root: /Users/wyc/SynPred/outputs/batch_reliability

# Execution safety.
dry_run: true
force: false

# Recovery module switches.
modules:
  audit_batch: true
  stage3_feature_source_audit: true
  stage3_input_extension: true
  recover_missing_structures: true
  validate_recovered_poscars: true
  regenerate_stage3_npz: true
  export_stage3_conditions: true
  normalize_recovered_candidates: true
  merge_recovered_results: true
  clipping_diagnostic: true
  global_clip_export: true
  gap_closure_report: true

# Thresholds for diagnosis.
thresholds:
  low_condition_support: 0.50
  medium_condition_support: 0.75
  high_condition_support: 0.90
  low_final_score: 0.45
  high_final_score: 0.55

# Target statuses from adaptive layer.
target_statuses:
  - pipeline_failed
  - needs_stage2_recovery
  - needs_stage3_recovery
  - needs_condition_reexport
  - needs_route_finalization_recovery
  - needs_manual_or_rule_recovery

# Current first version behavior.
# stage2/stage3 heavy recovery are planned and audited;
# condition export and route finalizer can call pipeline start_from steps.
execution:
  route_finalizer_start_from: summarize_routes
  condition_reexport_start_from: run_stage3_flow
  stage3_recovery_start_from: build_stage3_features
  stage2_recovery_start_from: sample_stage2_gflownet

# Bridge files from batch_adaptive.
adaptive_inputs:
  master_status_csv: /Users/wyc/SynPred/outputs/batch_adaptive/batch_500/master_status_standard.csv
  compact_watchlist_csv: /Users/wyc/SynPred/outputs/batch_adaptive/batch_500/batch_compact_overview/compact_watchlist.csv
  compact_top_routes_csv: /Users/wyc/SynPred/outputs/batch_adaptive/batch_500/batch_compact_overview/compact_top_routes.csv
  route_recommended_high_medium_csv: /Users/wyc/SynPred/outputs/batch_adaptive/batch_500/route_splits/route_recommended_high_medium.csv
